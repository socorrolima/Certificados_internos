<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Certificados — SNAS/MDS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="css/style.css" rel="stylesheet"/>
</head>
<body>

<!-- HEADER -->
<div class="header d-flex align-items-center gap-3">
  <div>
    <div class="fw-bold" style="font-size:1.15rem">🏛️ SNAS / MDS</div>
    <div style="font-size:.78rem;opacity:.82">Secretaria Nacional de Assistência Social</div>
  </div>
  <span class="badge ms-auto" style="background:#1a7a3c">GOV.BR</span>
</div>

<div class="container py-4" style="max-width:820px">

  <!-- BUSCA -->
  <div class="card p-4 mb-4">
    <h5 class="fw-bold text-primary mb-1">📄 Emissão de Certificado</h5>
    <p class="text-muted small mb-4">
      Digite seu nome completo para gerar seu certificado de participação.
    </p>

    <div id="aviso-config" class="alert alert-warning small py-2 mb-3" style="display:none">
      ⚠️ O sistema ainda não foi configurado pelo administrador.
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold">Nome completo</label>
      <input type="text" id="inp-nome" class="form-control"
             placeholder="Ex: João Silva"
             onkeydown="if(event.key==='Enter') buscar()"/>
    </div>

    <div class="mb-3" id="wrap-evento" style="display:none">
      <label class="form-label fw-semibold">Evento</label>
      <select id="sel-evento" class="form-select"></select>
    </div>

    <button class="btn btn-primary w-100 fw-bold py-2" onclick="buscar()">
      🎓 Gerar Certificado
    </button>
    <div id="msg-busca" class="mt-3" style="display:none"></div>
  </div>

  <!-- PREVIEW -->
  <div class="card p-4" id="area-preview" style="display:none">
    <h5 class="fw-bold text-primary mb-3">🖼️ Pré-visualização</h5>
    <div class="canvas-wrap">
      <canvas id="canvas-cert"></canvas>
    </div>
    <div id="qr-wrap" class="text-center mt-3" style="display:none">
      <p class="small text-muted mb-1">QR Code de validação</p>
      <div id="qr"></div>
    </div>
    <div class="d-flex gap-2 mt-3 flex-wrap">
      <button class="btn btn-success fw-bold" onclick="baixarPDF()">⬇️ Baixar PDF</button>
      <button class="btn btn-outline-primary fw-bold" onclick="limpar()">🔄 Nova consulta</button>
    </div>
    <div id="cert-codigo" class="mt-2 text-muted small"></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
// ── Estado compartilhado via localStorage ─────────
// O admin salva os dados no localStorage
// O index.html lê e usa

const ESTADO = {
  certAtual: null,
};

function carregarDados() {
  try {
    const raw = localStorage.getItem('cert_eventos');
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function verificarConfig() {
  const evs = carregarDados().filter(e => e.participantes && e.participantes.length > 0);
  document.getElementById('aviso-config').style.display = evs.length ? 'none' : 'block';
  atualizarSelectEvento(evs);
}

function atualizarSelectEvento(evs) {
  const sel  = document.getElementById('sel-evento');
  const wrap = document.getElementById('wrap-evento');
  if (evs.length > 1) {
    sel.innerHTML = evs.map((e, i) =>
      `<option value="${i}">${e.nome} — ${e.cidade}</option>`
    ).join('');
    wrap.style.display = '';
  } else {
    wrap.style.display = 'none';
  }
}

// ── Normalização ───────────────────────────────────
function normalizar(t) {
  if (!t) return '';
  return t.trim().toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/\s+/g, ' ');
}

function similaridade(a, b) {
  a = normalizar(a); b = normalizar(b);
  if (a === b) return 1.0;
  if (a.includes(b) || b.includes(a)) return 0.9;
  const pa = new Set(a.split(' '));
  const pb = new Set(b.split(' '));
  const comuns = [...pa].filter(x => pb.has(x));
  return comuns.length / Math.max(pa.size, pb.size);
}

// ── Busca ──────────────────────────────────────────
function buscar() {
  const nome = document.getElementById('inp-nome').value.trim();
  if (!nome) { msgBusca('⚠️ Digite seu nome completo.', 'warning'); return; }

  const evs = carregarDados().filter(e => e.participantes && e.participantes.length > 0);
  if (!evs.length) { msgBusca('⚠️ Sistema não configurado. Contate o administrador.', 'warning'); return; }

  const evento = evs.length === 1
    ? evs[0]
    : evs[parseInt(document.getElementById('sel-evento').value)];

  const nb  = normalizar(nome);
  let enc   = evento.participantes.find(p => normalizar(p.nome) === nb);

  if (!enc) {
    let best = null, score = 0;
    evento.participantes.forEach(p => {
      const s = similaridade(nome, p.nome);
      if (s > score) { score = s; best = p; }
    });
    if (score >= 0.80) enc = best;
  }

  if (!enc) {
    msgBusca('❌ Nome não encontrado. Favor procurar os organizadores do evento.', 'danger');
    document.getElementById('area-preview').style.display = 'none';
    return;
  }

  msgBusca('✅ Participante encontrado! Gerando certificado...', 'success');
  ESTADO.certAtual = { participante: enc, evento };
  renderizarCertificado(enc, evento);
}

// ── Renderiza certificado ──────────────────────────
function preencherTexto(tmpl, dados) {
  let t = tmpl;
  Object.entries(dados).forEach(([k, v]) => { t = t.replaceAll(`{${k}}`, v || ''); });
  return t;
}

function quebrarLinhas(ctx, texto, maxLarg) {
  const palavras = texto.split(' ');
  const linhas = []; let atual = '';
  for (const p of palavras) {
    const teste = atual ? atual + ' ' + p : p;
    if (ctx.measureText(teste).width > maxLarg && atual) { linhas.push(atual); atual = p; }
    else atual = teste;
  }
  if (atual) linhas.push(atual);
  return linhas;
}

async function renderizarCertificado(participante, evento) {
  const canvas = document.getElementById('canvas-cert');
  const ctx    = canvas.getContext('2d');

  // Carrega template (base64 salvo pelo admin)
  let tmpl;
  if (evento.templateBase64) {
    tmpl = await loadImg(evento.templateBase64);
  } else {
    tmpl = await demoImg();
  }

  const W = tmpl.naturalWidth  || 2480;
  const H = tmpl.naturalHeight || 1754;
  canvas.width = W; canvas.height = H;
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);
  ctx.drawImage(tmpl, 0, 0, W, H);

  const texto      = preencherTexto(evento.texto, {
    Nome: participante.nome, Municipio: participante.municipio || '',
    Cidade: evento.cidade,   Data: evento.periodo,
    Carga_Horaria: evento.carga,
  });
  const linhasRaw  = texto.split('\n').filter(l => l.trim());
  const szTexto    = Math.round(W * 0.020);
  const lhTexto    = szTexto * 1.7;
  const maxLarg    = W * 0.72;

  ctx.save();
  ctx.font = `bold ${szTexto}px Arial, sans-serif`;
  ctx.fillStyle = '#1a1a1a'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(255,255,255,0.95)'; ctx.shadowBlur = 6;
  const todasLinhas = [];
  linhasRaw.forEach(l => todasLinhas.push(...quebrarLinhas(ctx, l, maxLarg)));
  const totalH = todasLinhas.length * lhTexto;
  const yStart = H * 0.42 - totalH / 2 + lhTexto / 2;
  todasLinhas.forEach((l, i) => ctx.fillText(l, W / 2, yStart + i * lhTexto));
  ctx.restore();

  // Assinatura
  const yA = H * 0.73;
  ctx.save();
  ctx.strokeStyle = '#555'; ctx.lineWidth = Math.round(W * 0.0008);
  ctx.beginPath(); ctx.moveTo(W/2 - W*0.17, yA); ctx.lineTo(W/2 + W*0.17, yA); ctx.stroke();
  ctx.restore();

  const szA = Math.round(W * 0.016);
  ctx.save();
  ctx.font = `bold ${szA}px Arial`; ctx.fillStyle = '#1a1a1a';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(255,255,255,0.9)'; ctx.shadowBlur = 4;
  ctx.fillText('Elias de Souza Oliveira', W/2, yA + szA * 1.4);
  ctx.restore();

  const szC = Math.round(W * 0.012);
  const yC  = yA + szA * 3.2;
  ctx.save();
  ctx.font = `${szC}px Arial`; ctx.fillStyle = '#444';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(255,255,255,0.9)'; ctx.shadowBlur = 3;
  ctx.fillText('Diretor de Departamento de Proteção Social Básica', W/2, yC);
  ctx.fillText('da Secretaria Nacional de Assistência Social',      W/2, yC + szC * 1.6);
  ctx.restore();

  const codigo = 'CERT-' + new Date().getFullYear() + '-' + String(Date.now()).slice(-6);
  ESTADO.certAtual.codigo = codigo;
  document.getElementById('area-preview').style.display = 'block';
  document.getElementById('area-preview').scrollIntoView({ behavior: 'smooth' });
  document.getElementById('cert-codigo').innerHTML = 'Código: <strong>' + codigo + '</strong>';

  const qw = document.getElementById('qr-wrap');
  qw.style.display = 'block';
  document.getElementById('qr').innerHTML = '';
  new QRCode(document.getElementById('qr'), {
    text: window.location.origin + '/validar.html?cert=' + codigo,
    width: 100, height: 100
  });

  msgBusca('✅ Certificado gerado para: ' + participante.nome, 'success');
}

function loadImg(src) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.onload = () => res(img); img.onerror = rej; img.src = src;
  });
}

async function demoImg() {
  const W = 2480, H = 1754;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0,0,W,H);
  g.addColorStop(0,'#eef2ff'); g.addColorStop(1,'#dbeafe');
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#003580'; ctx.lineWidth=28; ctx.strokeRect(36,36,W-72,H-72);
  ctx.strokeStyle='#1a56db'; ctx.lineWidth=8;  ctx.strokeRect(66,66,W-132,H-132);
  ctx.fillStyle='#003580'; ctx.textAlign='center'; ctx.textBaseline='top';
  ctx.font='bold 72px Arial'; ctx.fillText('MINISTÉRIO DO DESENVOLVIMENTO E ASSISTÊNCIA SOCIAL',W/2,140);
  ctx.font='bold 150px Georgia,serif'; ctx.fillText('CERTIFICADO',W/2,360);
  ctx.fillStyle='#1a56db'; ctx.fillRect(280,560,W-560,6);
  ctx.fillStyle='#003580'; ctx.fillRect(W/2-320,H-220,640,4);
  ctx.font='44px Arial'; ctx.fillStyle='#6b7280'; ctx.fillText('Brasília — 2026',W/2,H-160);
  const img = new Image(); img.src = c.toDataURL('image/png');
  return new Promise(res => { img.onload = () => res(img); });
}

function baixarPDF() {
  if (!ESTADO.certAtual) return;
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });
  doc.addImage(document.getElementById('canvas-cert').toDataURL('image/png',1.0),'PNG',0,0,297,210);
  doc.save('Certificado_' + ESTADO.certAtual.participante.nome.replace(/\s+/g,'_') + '.pdf');
}

function msgBusca(txt, tipo) {
  const el = document.getElementById('msg-busca');
  el.className = 'alert alert-'+tipo+' py-2 small';
  el.textContent = txt; el.style.display = 'block';
}

function limpar() {
  document.getElementById('inp-nome').value = '';
  document.getElementById('area-preview').style.display = 'none';
  document.getElementById('msg-busca').style.display = 'none';
  ESTADO.certAtual = null;
  window.scrollTo({ top:0, behavior:'smooth' });
}

verificarConfig();
</script>
</body>
</html>
